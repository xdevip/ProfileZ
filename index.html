<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZDEV Trang Chủ</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins',sans-serif;
    }

    body{
      background:#f3f3f7;
      color:#222;
      padding:20px;
      transition:0.3s;
      -webkit-touch-callout:none;
    }

    img{
      -webkit-user-drag:none;
      user-select:none;
      pointer-events:none;
    }

    .container{
      max-width:480px;
      margin:auto;
    }

    .profile{
      text-align:center;
      margin-top:30px;
    }

    .avatar-frame{
      position:relative;
      width:220px;
      height:220px;
      margin:auto;
    }

    .avatar{
      position:absolute;
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;

      top:50%;
      left:50%;
      transform:translate(-50%,-50%);

      z-index:1;
    }

    .frame{
      position:absolute;
      width:220px;
      height:220px;
      object-fit:contain;

      top:0;
      left:0;

      z-index:2;
      pointer-events:none;
    }

    .name{
      font-size:42px;
      font-weight:700;
      margin-top:10px;
    }

    .verify{
      color:#1d9bf0;
      font-size:28px;
    }

    .desc{
      margin-top:5px;
      color:#777;
      font-size:20px;
    }

    .desc span{
      color:#6d5cff;
      font-weight:600;
    }

    .socials{
      display:flex;
      justify-content:center;
      gap:20px;
      margin-top:40px;
      margin-bottom:60px;
    }

    .social-btn{
      width:82px;
      height:82px;
      background:white;
      border-radius:24px;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      box-shadow:0 5px 15px rgba(0,0,0,0.08);
      transition:0.2s;
    }

    .social-btn:hover{
      transform:translateY(-5px);
    }

    .youtube{
      color:red;
      font-size:36px;
    }

    .telegram{
      color:#229ED9;
      font-size:34px;
    }

    .zalo{
      color:#0068ff;
      font-weight:700;
      font-size:28px;
    }

    .title{
      text-align:center;
      font-size:30px;
      font-weight:700;
      margin-bottom:25px;
    }

    .card{
      background:white;
      border-radius:30px;
      padding:18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:22px;
      box-shadow:0 5px 15px rgba(0,0,0,0.05);
      transition:0.3s;
    }

    .left{
      display:flex;
      align-items:center;
      gap:16px;
    }

    .game-img{
      width:75px;
      height:75px;
      border-radius:18px;
      object-fit:cover;
    }

    .game-name{
      font-size:18px;
      font-weight:600;
    }

    .date{
      color:#999;
      font-size:14px;
      margin-top:5px;
    }

    .download{
      width:54px;
      height:54px;
      border-radius:50%;
      background:#e97fff;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-size:20px;
      text-decoration:none;
      transition:0.2s;
    }

    .download:hover{
      transform:scale(1.1);
    }

    #theme-toggle{
      position:fixed;
      top:20px;
      right:20px;
      width:50px;
      height:50px;
      border:none;
      border-radius:50%;
      background:#111;
      color:white;
      font-size:20px;
      cursor:pointer;
      z-index:9999;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      transition:0.3s;
    }

    #theme-toggle:hover{
      transform:scale(1.1);
    }

    body.dark{
      background:#111;
      color:white;
    }

    body.dark .card{
      background:#1c1c1c;
      color:white;
    }

    body.dark .social-btn{
      background:#1c1c1c;
    }

    body.dark .desc{
      color:#bbb;
    }

    body.dark .date{
      color:#888;
    }

    body.dark .title{
      color:white;
    }

    @media(max-width:500px){

      .name{
        font-size:34px;
      }

      .desc{
        font-size:18px;
      }

    }

  </style>
</head>

<body>

<button id="theme-toggle">
  <i class="fa-solid fa-moon"></i>
</button>

<div class="container">

  <div class="profile">

    <div class="avatar-frame">

      <img class="frame"
      src="https://i.imgur.com/A0m3qWU.png">

      <img class="avatar"
      src="https://i.imgur.com/qq6ppr5.jpeg">

    </div>

    <div class="name">
      ZDEV
      <i class="fa-solid fa-circle-check verify"></i>
    </div>

    <div class="desc">
      Wedsite <span>ModHack.</span>
    </div>

    <div class="socials">

      <a href="#" class="social-btn">
        <i class="fa-brands fa-youtube youtube"></i>
      </a>

      <a href="#" class="social-btn">
        <div class="zalo">Zalo</div>
      </a>

      <a href="#" class="social-btn">
        <i class="fa-brands fa-telegram telegram"></i>
      </a>

    </div>

  </div>

  <div class="title">Tải Game</div>

  <div class="card">

    <div class="left">

      <img class="game-img"
      src="https://i.imgur.com/P3wTwbL.png">

      <div>

        <div class="game-name">
          Menu Hack Map IOS
        </div>

        <div class="date">
          Đang Hoạt Động 🟢
        </div>

      </div>

    </div>

    <a href="https://fb.com"
    target="_blank"
    class="download">

      <i class="fa-solid fa-download"></i>

    </a>

  </div>

  <div class="card">

    <div class="left">

      <img class="game-img"
      src="https://i.imgur.com/P3wTwbL.png">

      <div>

        <div class="game-name">
          Menu Hack Map Android
        </div>

        <div class="date">
          Đang hoạt động 🟢
        </div>

      </div>

    </div>

    <a href="https://fb.com"
    target="_blank"
    class="download">

      <i class="fa-solid fa-download"></i>

    </a>

  </div>

  <div class="title">
    Get Key IOS
  </div>

  <div class="card">

    <div class="left">

      <img class="game-img"
      src="https://i.imgur.com/P3wTwbL.png">

      <div>

        <div class="game-name">
          Key Hack Map IOS
        </div>

        <div class="date">
          Đang hoạt động 🟢
        </div>

      </div>

    </div>

    <a href="https://fb.com"
    target="_blank"
    class="download">

      <i class="fa-solid fa-key"></i>

    </a>

  </div>

  <div class="title">
    Get Key Android
  </div>

  <div class="card">

    <div class="left">

      <img class="game-img"
      src="https://i.imgur.com/P3wTwbL.png">

      <div>

        <div class="game-name">
          Key Hack Map Android
        </div>

        <div class="date">
          Đang hoạt động 🟢
        </div>

      </div>

    </div>

    <a href="https://fb.com"
    target="_blank"
    class="download">

      <i class="fa-solid fa-key"></i>

    </a>

  </div>

</div>

<audio id="music" loop autoplay hidden>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>

document.addEventListener("click", function () {
  document.getElementById("music").play();
}, { once:true });

const toggle = document.getElementById("theme-toggle");

toggle.onclick = () => {
  document.body.classList.toggle("dark");

  if(document.body.classList.contains("dark")){
    toggle.innerHTML = '<i class="fa-solid fa-sun"></i>';
  }else{
    toggle.innerHTML = '<i class="fa-solid fa-moon"></i>';
  }
};

/* Chặn chuột phải */
document.addEventListener("contextmenu", function(e){
  e.preventDefault();
});

/* Chặn copy */
document.addEventListener("copy", function(e){
  e.preventDefault();
});

/* Chặn chọn văn bản */
document.addEventListener("selectstart", function(e){
  e.preventDefault();
});

/* Chặn kéo ảnh */
document.addEventListener("dragstart", function(e){
  e.preventDefault();
});

/* Chặn phím tắt */
document.addEventListener("keydown", function(e){

  if(e.key === "F12"){
    e.preventDefault();
  }

  if(e.ctrlKey && e.key.toLowerCase() === "u"){
    e.preventDefault();
  }

  if(e.ctrlKey && e.key.toLowerCase() === "c"){
    e.preventDefault();
  }

  if(e.ctrlKey && e.key.toLowerCase() === "s"){
    e.preventDefault();
  }

  if(e.ctrlKey && e.shiftKey && e.key.toLowerCase() === "i"){
    e.preventDefault();
  }

});

</script>

</body>
  </html>
